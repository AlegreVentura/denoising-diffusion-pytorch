# Configuracion MNIST / Fashion-MNIST para verificacion de correctitud
# Converge en ~1h en una GPU de consumidor

dataset:
  name: mnist               # mnist | fashion_mnist
  image_size: 28
  image_channels: 1
  data_root: ./data/raw
  batch_size: 128
  num_workers: 4
  val_fraction: 0.1

diffusion:
  num_timesteps: 1000
  schedule: linear
  beta_start: 0.0001
  beta_end: 0.02

model:
  base_channels: 64         # mas pequeno que CIFAR-10
  channel_multipliers: [1, 2, 2]
  num_res_blocks: 2
  attention_resolutions: [14]
  dropout: 0.1
  num_groups: 16            # menos grupos porque hay menos canales

ema:
  decay: 0.9999
  warmup_steps: 0

training:
  learning_rate: 0.0002
  total_steps: 100000       # suficiente para ver digitos reconocibles
  grad_clip_max_norm: 1.0
  use_amp: true

  log_every_n_steps: 50
  save_every_n_steps: 2000
  sample_every_n_steps: 5000
  val_every_n_steps: 500

  checkpoint_dir: ./checkpoints/mnist

sampling:
  num_samples_for_fid: 10000
  num_display_samples: 64
  ddim_steps: [1000, 100, 50, 20]
